# Project-level tool configuration.
#
# Codacy's SaaS pylint scanner reads this file; keep it in sync with
# /.pylintrc at the repo root (which is what contributor terminals and
# pre-commit hooks use).  Drift between the two produces mismatched
# PR-check vs. local-lint results.

[tool.pylint.main]
# Pin so PEP 585 generic syntax (`list[str]`, `dict[str, Any]`,
# `tuple[int, int]`) does not trip `unsubscriptable-object`.
py-version = "3.10"

# The container launches uvicorn from inside `/app`, so intra-project
# imports are written as `from services.x import y`.  Put `app/` on
# sys.path so pylint resolves them instead of flagging `import-error`.
init-hook = "import sys; sys.path.insert(0, 'app')"

ignore = [".venv", "venv", "node_modules", "app/.venv", "static/vendor"]

[tool.pylint."messages control"]
# Disables silence rules that fire on this codebase's deliberate
# conventions.  Rationale inline against each cluster.
disable = [
    # --- Docstrings ---------------------------------------------------
    # Project convention: document public API surface (FastAPI routes,
    # service class methods that appear in routes).  Do not require
    # docstrings on every private helper.  Both the legacy C0111 ID
    # and the split modern IDs so this survives pylint version bumps.
    "C0111",
    "C0112",
    "C0114",
    "C0115",
    "C0116",
    "missing-docstring",
    "missing-module-docstring",
    "missing-class-docstring",
    "missing-function-docstring",
    "missing-method-docstring",

    # --- PEP 585 false positives -------------------------------------
    # py-version=3.10 should handle these but Codacy's pylint build
    # occasionally ignores that pragma; belt-and-braces.
    "E1136",
    "unsubscriptable-object",

    # --- Stylistic complexity ---------------------------------------
    # mccabe is a better signal for "function is too complex" than
    # hard local-count / statement-count thresholds which fire on
    # FastAPI startup and chdman subprocess orchestration.
    "R0901",
    "R0902",
    "R0903",
    "R0911",
    "R0912",
    "R0913",
    "R0914",
    "R0915",
    "R0916",
    "too-many-ancestors",
    "too-many-arguments",
    "too-many-boolean-expressions",
    "too-many-branches",
    "too-many-instance-attributes",
    "too-many-locals",
    "too-many-public-methods",
    "too-many-return-statements",
    "too-many-statements",
    "too-few-public-methods",

    # --- Lazy imports -------------------------------------------------
    # Intentional: break circular deps at module load, defer expensive
    # sqlalchemy/alembic imports until first use.
    "C0415",
    "import-outside-toplevel",

    # --- Test-only seams ----------------------------------------------
    # Tests legitimately poke at `_load_state`, `_all_records_sync`,
    # etc.  Enforcing protected-access here would push internals to
    # become public API for no real benefit.
    "W0212",
    "protected-access",

    # --- pytest fixture chaining --------------------------------------
    "W0621",
    "redefined-outer-name",

    # --- Framework kwargs --------------------------------------------
    # FastAPI route handlers and test fixtures accept kwargs that are
    # only consumed by the framework (e.g. `http_request: Request`).
    "W0613",
    "unused-argument",

    # --- Intentional broad except ------------------------------------
    # Wrapping every subprocess boundary (chdman/dolphin-tool/z3ds)
    # with `except Exception:` is deliberate — we turn failures into
    # structured error responses.  Explicit logging at the call site
    # is required (enforced by review).
    "W0703",
    "W0718",
    "broad-except",
    "broad-exception-caught",

    # --- Short names --------------------------------------------------
    # `e` for exception, `p` for path — idiomatic; renaming would
    # hurt readability.
    "C0103",
    "invalid-name",

    # --- Deprecated upstream -----------------------------------------
    # bad-continuation was removed from pylint in 2.6; Codacy still
    # emits it.
    "C0330",
    "bad-continuation",

    # --- Duplicate-code -----------------------------------------------
    # Fires on intentional session-factory boilerplate shared across
    # the three stores.  Worth refactoring eventually but not a
    # defect.
    "R0801",
    "duplicate-code",

    # --- Module-level singletons -------------------------------------
    # engine / SessionLocal are documented, guarded module globals.
    "W0603",
    "global-statement",

    # --- Stylistic handled elsewhere ---------------------------------
    "C0303",  # trailing-whitespace (ruff in CI)
    "trailing-whitespace",
    "C0326",  # keyword-arg spacing (ruff in CI)
    "bad-whitespace",
    "C0411",  # wrong-import-order (isort in CI)
    "wrong-import-order",

    # --- Debatable stylistic -----------------------------------------
    "R0201",  # no-self-use — helpers kept instance-scoped for API symmetry
    "no-self-use",
    "W0107",  # unnecessary-pass
    "unnecessary-pass",
    "R1716",  # chained-comparison — fires on readable patterns
    "chained-comparison",

    # --- Module size ------------------------------------------------
    # too-many-lines default threshold (1000) fires on deliberately
    # cohesive units (job_manager, info routes, disc_id).  Splitting
    # purely to satisfy the rule would fragment tightly-coupled logic
    # across modules for no functional benefit.
    "C0302",
    "too-many-lines",

    # --- Meta-warnings ----------------------------------------------
    # `locally-disabled` fires on every inline `# pylint: disable=X`
    # pragma.  We use those pragmas deliberately (e.g. migrations/env.py
    # wrong-import-position); silencing the meta rule lets them stand
    # without also generating a second alert about the pragma itself.
    "I0011",
    "locally-disabled",

    # --- Codacy-sandbox false positives ------------------------------
    # Codacy runs pylint without the project venv or `app/` on
    # sys.path, so it cannot resolve first-party modules
    # (`utils.path_utils`, `services.dat_sync`) or third-party deps
    # (`sqlalchemy`, `fastapi.concurrency`).  `AsyncMock` from
    # `unittest.mock` (py3.8+) also trips the older stub set Codacy
    # ships.  Local pylint with the venv resolves all of these.
    "E0611",
    "no-name-in-module",
    "E0401",
    "import-error",

    # `asyncio.subprocess.Process` is read by pylint as `subprocess`
    # attribute lookup — a known stub-resolution quirk against the
    # `asyncio.subprocess` submodule.  Version-gated `typing` attrs
    # also trip here.
    "E1101",
    "no-member",

    # Codacy's embedded pylint parser occasionally fails on modern
    # Python syntax (PEP 570 positional-only `/`, PEP 695 generics);
    # ruff/mypy in CI are the authoritative syntax gate.
    "E0001",
    "syntax-error",
]

[tool.pylint.format]
max-line-length = 100
indent-string = "    "

[tool.pylint.design]
max-line-length = 100

[tool.pylint.similarities]
min-similarity-lines = 10
ignore-imports = true
ignore-docstrings = true
ignore-comments = true
