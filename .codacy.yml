---
engines:
  csslint:
    # IMPORTANT: Codacy does NOT honour `enabled: false` in this file
    # (per docs — tool on/off is UI-only via the Code patterns page).
    # We therefore route every CSS file to exclude_paths so the engine
    # has nothing to analyse.  Rationale for neutralising csslint:
    # its parser predates CSS custom properties (var(--...)), grid
    # `fr` units, and other modern syntax; every `:root` and
    # `grid-template-columns` trips a CSSLint_errors parse failure.
    # Stylelint (.stylelintrc.json) covers the same space properly.
    exclude_paths:
      - "**/*.css"
  remarklint:
    # Same story as csslint — `enabled: false` is ignored by Codacy.
    # `list-item-bullet-indent` and `no-literal-urls` fire on nearly
    # every bullet/URL across docs; we don't want markdown style
    # enforcement in the dashboard (GitHub renders docs fine).
    exclude_paths:
      - "**/*.md"
  eslint:
    # `enabled: false` is ignored by Codacy — set the tool to "off"
    # on the Code patterns UI page if you want to hide its results.
    # Project uses ESLint 9 flat config; Codacy CLI bundles ESLint 8.
    enabled: false
  ruff:
    # Codacy's ruff wrapper attempts to parse plain-text dependency
    # manifests as Python, which trips "SyntaxError" alerts for every
    # line in requirements*.txt.  Route requirements files away from
    # ruff; Trivy still scans them for vulnerable dependencies.
    exclude_paths:
      - "requirements*.txt"
  pmd:
    enabled: true
    config_file: config/pmd/ruleset.xml
  pylint:
    enabled: true
    config_file: .pylintrc
  semgrep:
    enabled: true
  trivy:
    enabled: true
  bandit:
    # `enabled: false` is ignored by Codacy — the flag below is advisory.
    # Set bandit to "off" on the Code patterns UI page to actually suppress.
    # Context: Codacy's bandit wrapper does not honour config_file's
    # `exclude_dirs` nor .codacy.yml's `exclude_paths: tests/**`, so
    # every `assert` in tests/ fires B101 (98+ alerts) regardless of
    # what we set.  Semgrep (enabled below) provides overlapping SAST
    # coverage for the subprocess/SQL/crypto checks we actually care
    # about, so disabling bandit does not reduce real security signal.
    enabled: false
  prospector:
    enabled: true
    config_file: .prospector.yaml

exclude_paths:
  - "node_modules/**"
  - ".venv/**"
  - "app/.venv/**"
  - "**/*.min.js"
  - "**/*.min.css"
  - "**/*.bundle.js"
  - ".codacy/**"
  - "config/pmd/**"
  # Vite build output (regenerated by `npm run build` and by the Docker
  # frontend-builder stage). Not source code; nothing for Codacy to lint.
  - "static/assets/**"
  # Tests use `assert` as the pytest failure mechanism (B101) and monkey-
  # patch module internals.  Codacy's bandit wrapper does not honour the
  # config_file's exclude_dirs in practice (observed 98 B101 alerts in
  # tests/ even with .codacy/tools-configs/bandit.yaml set).  Exclude at
  # the Codacy level instead.  Test code is still linted by pylint/ruff
  # in CI; SAST on app/ code continues to run.
  - "tests/**"
  - "config/pmd/**"
  # Binary files that crash the CLI SARIF generator (MalformedInputException)
  - ".local-bin/**"
  - "**/*.png"
  - "**/*.ico"
  - "verify_test.py"
  - "ui.png"
  # Generated / captured runtime logs checked in for debugging
  - "*.log"
  - "server_*.log"
  - "recent_log.txt"
  # Generated lockfile — not source code.  Codacy's jackson JSON parser
  # chokes on comments / odd encoding inside large npm lockfiles.
  - "package-lock.json"
