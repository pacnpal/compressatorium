---
engines:
  eslint:
    enabled: false  # Project uses ESLint 9 flat config; Codacy CLI bundles ESLint 8
  pmd:
    enabled: true
    config_file: config/pmd/ruleset.xml
  pylint:
    enabled: true
  semgrep:
    enabled: true
  trivy:
    enabled: true
  bandit:
    enabled: true

exclude_paths:
  - "node_modules/**"
  - ".venv/**"
  - "app/.venv/**"
  - "**/*.min.js"
  - "**/*.min.css"
  - "**/*.bundle.js"
  - ".codacy/**"
  - "config/pmd/**"
  # Vendored third-party bundles — not our code, not our conventions.
  # preact.mjs, htm.mjs, etc. are pre-built distributions from upstream.
  - "static/vendor/**"
  # Tests use `assert` as the pytest failure mechanism (B101) and monkey-
  # patch module internals.  Bandit skips these via .bandit's exclude_dirs
  # but other scanners (jshint, pmd) don't need to look here either —
  # they'd flag every fixture's fake kwargs.  Keep test code linted by
  # pylint (our .pylintrc explicitly allows unused-argument and
  # protected-access) and by ruff (enforced in CI), and skip the other
  # scanners.
  # (Bandit specifically is gated in .bandit, not here, so SAST on app/
  # code still runs.)
  - "config/pmd/**"
  # Binary files that crash the CLI SARIF generator (MalformedInputException)
  - ".local-bin/**"
  - "**/*.png"
  - "**/*.ico"
  - "verify_test.py"
  - "ui.png"
  # Generated / captured runtime logs checked in for debugging
  - "*.log"
  - "server_*.log"
  - "recent_log.txt"
