---
engines:
  eslint:
    enabled: false  # Project uses ESLint 9 flat config; Codacy CLI bundles ESLint 8
  pmd:
    enabled: true
    config_file: config/pmd/ruleset.xml
  pylint:
    enabled: true
  semgrep:
    enabled: true
  trivy:
    enabled: true
  bandit:
    enabled: true

exclude_paths:
  - "node_modules/**"
  - ".venv/**"
  - "app/.venv/**"
  - "**/*.min.js"
  - "**/*.min.css"
  - "**/*.bundle.js"
  - ".codacy/**"
  - "config/pmd/**"
