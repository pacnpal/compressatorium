<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compressatorium</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="/static/images/favicon.ico" type="image/x-icon">
</head>
<body>
    <div id="app">
        <div class="loading full-height">
            <img src="/static/images/logo.png" alt="Compressatorium" class="loading-logo" />
            <div class="spinner"></div>
            Loading Compressatorium...
        </div>
    </div>

    <script type="module">
        try {
            const { html, render, Component, useState, useEffect, useCallback, useRef, useMemo } = await import("/static/vendor/standalone.mjs");

            globalThis.html = html;
            globalThis.render = render;
            globalThis.Component = Component;
            globalThis.useState = useState;
            globalThis.useEffect = useEffect;
            globalThis.useCallback = useCallback;
            globalThis.useRef = useRef;
            globalThis.useMemo = useMemo;

            let appVersion = "dev";
            try {
                const versionRes = await fetch("/api/version", { cache: "no-store" });
                if (versionRes.ok) {
                    const payload = await versionRes.json();
                    if (payload && payload.version) appVersion = String(payload.version);
                }
            } catch (_) {
                // Best effort cache-busting; keep fallback version token.
            }
            await import(`/static/js/app.js?v=${encodeURIComponent(appVersion)}`);
        } catch (err) {
            const appEl = document.getElementById('app');
            if (appEl) {
                appEl.innerHTML = `
                    <div class="error-state">
                        <h1>Failed to load application</h1>
                        <p>${err && err.message ? err.message : 'Unknown error'}</p>
                        <button onclick="location.reload()">Retry</button>
                    </div>
                `;
            }
            console.error('Failed to load:', err);
        }
    </script>
</body>
</html>
