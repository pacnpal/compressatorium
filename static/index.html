<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHD Converter</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app"></div>

    <!-- Preact + HTM from CDN (no build step) -->
    <script type="module">
        import { h, render } from 'https://esm.sh/preact@10.19.3';
        import { useState, useEffect, useCallback } from 'https://esm.sh/preact@10.19.3/hooks';
        import htm from 'https://esm.sh/htm@3.1.1';

        const html = htm.bind(h);

        // Make available globally for components
        window.h = h;
        window.html = html;
        window.useState = useState;
        window.useEffect = useEffect;
        window.useCallback = useCallback;
        window.render = render;

        // Load main app after globals are set
        import('/static/js/app.js');
    </script>
</body>
</html>
