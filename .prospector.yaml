# Prospector configuration.  Codacy runs prospector as a separate
# scanner on top of pylint; it embeds its own pylint wrapper that does
# not always honour .pylintrc.  Declare the disables here too so
# prospector's findings line up with pylint's.

strictness: medium

test-warnings: false
doc-warnings: false
member-warnings: false
autodetect: true

inherits:
  - default

python-targets:
  - 3

pylint:
  run: true
  disable:
    - missing-docstring
    - missing-module-docstring
    - missing-class-docstring
    - missing-function-docstring
    - missing-method-docstring
    - unsubscriptable-object
    - too-many-ancestors
    - too-many-arguments
    - too-many-positional-arguments
    - too-many-boolean-expressions
    - too-many-branches
    - too-many-instance-attributes
    - too-many-locals
    - too-many-public-methods
    - too-many-return-statements
    - too-many-statements
    - too-few-public-methods
    - import-outside-toplevel
    - protected-access
    - redefined-outer-name
    - unused-argument
    - broad-except
    - broad-exception-caught
    - invalid-name
    - bad-continuation
    - duplicate-code
    - global-statement
    - trailing-whitespace
    - no-self-use
    - wrong-import-order
    - unnecessary-pass
    - bad-whitespace
    - chained-comparison
    - too-many-nested-blocks
    - consider-using-get
    - cell-var-from-loop
    - logging-fstring-interpolation
    - too-many-lines
    - locally-disabled   # meta-warning that fires on every inline
                         # `# pylint: disable=...` pragma; silencing
                         # the meta rule lets us keep targeted pragmas.
    - no-name-in-module
    - import-error
    - no-member
    - syntax-error
    - django-not-configured   # Codacy ships pylint-django which fires I1010
                              # on non-Django projects; suppress the false positive.
  options:
    max-line-length: 100

pep8:
  disable:
    - E501   # line too long — covered by pylint's max-line-length
    - W503   # line-break-before-binary-operator (PEP 8 updated guidance)
    - W504   # line-break-after-binary-operator
    - E901   # syntax-error — FP on PEP 570 `/` positional-only marker
             # in `app/config.py`; same cause as pylint E0001 and
             # pyflakes F999 disables above.

mccabe:
  disable:
    - MC0001  # complexity — noisy on startup / subprocess orchestration
    - MC0000  # syntax error — fourth scanner surface for the same PEP 570
              # `/` false positive in `app/config.py` already silenced in
              # pylint (E0001), pyflakes (F999), and pep8 (E901).

dodgy:
  run: true

pyflakes:
  disable:
    - F401   # unused import — pylint W0611 handles this; suppresses double-count
    - F999   # invalid syntax — false positive on PEP 570 `/` positional-only
             # marker in `app/config.py`.  Prospector's bundled pyflakes uses
             # an older parser than ruff/mypy in CI.

ignore-paths:
  - .venv
  - venv
  - app/.venv
  - node_modules
  - static/vendor
  - config/pmd
