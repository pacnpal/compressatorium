<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico" />
    <title>Compressatorium</title>
    <script>
      // Allowlist clamp prevents an arbitrary localStorage value (corrupted
      // store, extension-injected key) from being written as a data-theme
      // attribute we can't resolve to a tokens.css block.
      (function () {
        try {
          var raw = localStorage.getItem('theme-preference');
          var stored =
            raw === 'light' || raw === 'dark' || raw === 'system' ? raw : 'system';
          var resolved =
            stored === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : stored;
          document.documentElement.dataset.theme = resolved;
        } catch (_e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
