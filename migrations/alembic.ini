[alembic]
# Path to the migration scripts, relative to this file.
script_location = %(here)s

# The sqlalchemy.url is resolved dynamically in env.py from the running
# app's settings, so intentionally left blank here.  Do not set it
# statically — doing so would override the runtime-resolved path and
# let ``alembic upgrade`` write to a different DB than the app uses.
sqlalchemy.url =

# Revision file layout
version_path_separator = os
file_template = %%(rev)s_%%(slug)s

# Keep generated migration files line-length sane
output_encoding = utf-8

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
