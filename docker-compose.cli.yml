version: '3.8'

# Example: CLI mode for batch/automated conversion
# Usage: docker-compose -f docker-compose.cli.yml up
# This will convert all files and exit

services:
  compressatorium-cli:
    image: pacnpal/compressatorium:latest
    container_name: compressatorium-cli
    environment:
      # CLI mode for batch processing
      - CHD_MODE=cli
      # Conversion mode: createcd for CD-ROM, createdvd for DVD-ROM (PSP, PS2)
      - CHDMAN_MODE=createcd
      # Auto-discover mounted volumes under this root (/data/*)
      - COMPRESSATORIUM_MOUNT_ROOT=/data
      # Optional: override temp location (default: /config/temp)
      # - CHD_TEMP_DIR=/temp
      # Optional: remap container runtime UID/GID (Unraid-friendly)
      # - PUID=99
      # - PGID=100
      # Reduce CPU/IO impact of conversions (applies to all tools)
      - COMPRESSATORIUM_TOOL_NICE=10
      - COMPRESSATORIUM_TOOL_IOPRIO_CLASS=2
      - COMPRESSATORIUM_TOOL_IOPRIO_LEVEL=6
    volumes:
      # Required: Persistent config storage
      - ./config:/config
      # Optional: mount custom temp location (must match CHD_TEMP_DIR)
      # - ./temp:/temp
      # Mount directory with files to convert (read-write)
      - ./games:/data/games
    # No restart policy - container exits after conversion
    restart: "no"
