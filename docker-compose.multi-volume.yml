version: '3.8'

# Example: Multiple game libraries with separate volume mounts
# Usage: docker-compose -f docker-compose.multi-volume.yml up -d

services:
  compressatorium:
    image: pacnpal/compressatorium:latest
    container_name: compressatorium-multi
    ports:
      - "8080:8080"
    environment:
      - CHD_MODE=webui
      # Auto-discover mounted volumes under this root (/data/*)
      - COMPRESSATORIUM_MOUNT_ROOT=/data
      # Optional: override temp location (default: /config/temp)
      # - CHD_TEMP_DIR=/temp
      # Optional: remap container runtime UID/GID (Unraid-friendly)
      # - PUID=99
      # - PGID=100
      - CHDMAN_MODE=createcd
      - MAX_CONCURRENT_JOBS=1
      - COMPRESSATORIUM_TOOL_NICE=10
      - COMPRESSATORIUM_TOOL_IOPRIO_CLASS=2
      - COMPRESSATORIUM_TOOL_IOPRIO_LEVEL=6
    volumes:
      # Required: Persistent config storage
      - ./config:/config
      # Optional: mount custom temp location (must match CHD_TEMP_DIR)
      # - ./temp:/temp
      # Map each host directory to its corresponding container path
      - ./games/dreamcast:/data/dreamcast
      - ./games/psp:/data/psp
      - ./games/ps1:/data/ps1
      - ./games/ps2:/data/ps2
    restart: unless-stopped
    # Resource limits (adjust based on your system)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 8G
        reservations:
          cpus: '0.5'
          memory: 512M
