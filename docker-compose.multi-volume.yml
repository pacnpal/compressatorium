version: '3.8'

# Example: Multiple game libraries with separate volume mounts
# Usage: docker-compose -f docker-compose.multi-volume.yml up -d

services:
  compressatorium:
    image: pacnpal/compressatorium:latest
    container_name: compressatorium-multi
    ports:
      - "8080:8080"
    environment:
      - CHD_MODE=webui
      # Multiple volumes - list all container paths here
      - CHD_VOLUMES=/data/dreamcast,/data/psp,/data/ps1,/data/ps2
      # Optional: override temp location (default: /config/temp)
      # - CHD_TEMP_DIR=/temp
      - CHDMAN_MODE=createcd
      - MAX_CONCURRENT_JOBS=1
      - CHD_CHDMAN_NICE=10
      - CHD_CHDMAN_IOPRIO_CLASS=2
      - CHD_CHDMAN_IOPRIO_LEVEL=6
    volumes:
      # Required: Persistent config storage
      - ./config:/config
      # Optional: mount custom temp location (must match CHD_TEMP_DIR)
      # - ./temp:/temp
      # Map each host directory to its corresponding container path
      - ./games/dreamcast:/data/dreamcast
      - ./games/psp:/data/psp
      - ./games/ps1:/data/ps1
      - ./games/ps2:/data/ps2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    # Resource limits (adjust based on your system)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 8G
        reservations:
          cpus: '0.5'
          memory: 512M
