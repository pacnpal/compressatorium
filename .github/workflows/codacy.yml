# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow checks out code, performs a Codacy security scan
# and integrates the results with the
# GitHub Advanced Security code scanning feature.  For more information on
# the Codacy security scan action usage and parameters, see
# https://github.com/codacy/codacy-analysis-cli-action.
# For more information on Codacy Analysis CLI in general, see
# https://github.com/codacy/codacy-analysis-cli.

name: Codacy Security Scan

on:
  push:
    branches: [ "latest" ]
  pull_request:
  schedule:
    - cron: '17 2 * * 2'

permissions:
  contents: read

concurrency:
  group: codacy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  codacy-security-scan:
    outputs:
      sarif-matrix: ${{ steps.split-sarif.outputs.matrix }}
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    environment: codacy
    steps:
      # Checkout the repository to the GitHub Actions runner
      - name: Checkout code
        uses: actions/checkout@v6

      # Execute Codacy Analysis CLI and generate a SARIF output with the security issues identified during the analysis
      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@562ee3e92b8e92df8b67e0a5ff8aa8e261919c08
        continue-on-error: true
        with:
          # Check https://github.com/codacy/codacy-analysis-cli#project-token to get your project token from your Codacy repository
          # You can also omit the token and run the tools that support default configurations
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: results.sarif
          format: sarif
          # Adjust severity of non-security issues
          gh-code-scanning-compat: true
          # Force 0 exit code to allow SARIF file generation
          # This will handover control about PR rejection to the GitHub side
          max-allowed-issues: 2147483647

      # Ensure a valid SARIF file exists before uploading
      # The CLI runs in Docker as root, so results.sarif may be root-owned
      - name: Validate SARIF output
        if: always()
        run: |
          sudo chown "$(id -u):$(id -g)" results.sarif 2>/dev/null || true
          if [ ! -s results.sarif ] || ! python3 -c "import json, sys; json.load(open('results.sarif'))" 2>/dev/null; then
            echo '{"$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"CodacyCLI","rules":[]}},"results":[]}]}' > results.sarif
            echo "::warning::Codacy CLI produced empty or invalid SARIF — substituted empty result set"
          fi

      - name: Split SARIF runs
        id: split-sarif
        if: always()
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          source = Path("results.sarif")
          if source.exists():
            payload = json.loads(source.read_text(encoding="utf-8"))
          else:
            payload = {
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": [{"tool": {"driver": {"name": "CodacyCLI", "rules": []}}, "results": []}],
            }

          runs = payload.get("runs") or [{"tool": {"driver": {"name": "CodacyCLI", "rules": []}}, "results": []}]
          output_dir = Path("codacy-sarif-runs")
          output_dir.mkdir(exist_ok=True)

          matrix = {"include": []}
          for index, run in enumerate(runs, start=1):
            driver_name = (
              run.get("tool", {})
              .get("driver", {})
              .get("name", "codacy")
            )
            slug = re.sub(r"[^a-z0-9]+", "-", driver_name.lower()).strip("-") or "codacy"
            filename = f"run-{index}.sarif"
            category = f"/codacy/{slug}-{index}"
            sarif = {
              "$schema": payload.get("$schema", "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json"),
              "version": payload.get("version", "2.1.0"),
              "runs": [run],
            }
            (output_dir / filename).write_text(json.dumps(sarif), encoding="utf-8")
            matrix["include"].append({"file": filename, "category": category})

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            print(f"matrix={json.dumps(matrix)}", file=fh)
          PY

      - name: Upload split SARIF artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: codacy-sarif-runs
          path: codacy-sarif-runs/*.sarif
          if-no-files-found: error

  upload-sarif-results:
    name: Upload SARIF results (${{ matrix.category }})
    needs: codacy-security-scan
    if: always() && needs.codacy-security-scan.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.codacy-security-scan.outputs.sarif-matrix) }}
    steps:
      - name: Download split SARIF artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.1.3 - pinned for CVE fix
        with:
          name: codacy-sarif-runs
          path: codacy-sarif-runs

      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: codacy-sarif-runs/${{ matrix.file }}
          category: ${{ matrix.category }}
