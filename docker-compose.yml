version: '3.8'

services:
  compressatorium:
    image: pacnpal/compressatorium:latest
    container_name: compressatorium
    ports:
      - "8080:8080"
    environment:
      # Mode: webui (default) or cli
      - CHD_MODE=webui
      # Auto-discover mounted volumes under this root (/data/*)
      - COMPRESSATORIUM_MOUNT_ROOT=/data
      # Optional: override temp location (default: /config/temp)
      # - CHD_TEMP_DIR=/temp
      # Conversion mode: createcd (CD-ROM) or createdvd (DVD-ROM)
      - CHDMAN_MODE=createcd
      # Maximum parallel conversion jobs (Web UI only)
      - MAX_CONCURRENT_JOBS=1
      # Reduce CPU/IO impact of chdman
      - CHD_CHDMAN_NICE=10
      - CHD_CHDMAN_IOPRIO_CLASS=2
      - CHD_CHDMAN_IOPRIO_LEVEL=6
      # igir ROM collection manager
      # - IGIR_DAT_PATH=/dats
      # - MAX_IGIR_CONCURRENT=1
    volumes:
      # Required: Persistent config storage
      - ./config:/config
      # Optional: mount custom temp location (must match CHD_TEMP_DIR)
      # - ./temp:/temp
      # Mount your game directories here
      # The Web UI will recursively browse all subdirectories
      # Example directory structure:
      #   ./games/
      #   ├── Dreamcast/
      #   ├── PSP/
      #   └── PS1/
      # Syntax: /host/path:/container/path
      - ./games:/data/games
      # Optional: mount DAT files for igir ROM matching (No-Intro, Redump, etc.)
      # - ./dats:/dats
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    # Resource limits (adjust based on your system)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 8G
        reservations:
          cpus: '0.5'
          memory: 512M
