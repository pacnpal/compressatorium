version: '3.8'

services:
  compressatorium:
    image: pacnpal/compressatorium:latest
    container_name: compressatorium
    ports:
      - "8080:8080"
    environment:
      # Mode: webui (default) or cli
      - CHD_MODE=webui
      # Auto-discover mounted volumes under this root (/data/*)
      - COMPRESSATORIUM_MOUNT_ROOT=/data
      # Optional: override temp location (default: /config/temp)
      # - CHD_TEMP_DIR=/temp
      # Optional: remap container runtime UID/GID (Unraid-friendly)
      # - PUID=99
      # - PGID=100
      # Conversion mode: createcd (CD-ROM) or createdvd (DVD-ROM)
      - CHDMAN_MODE=createcd
      # Maximum parallel conversion jobs (Web UI only)
      - MAX_CONCURRENT_JOBS=1
      # Reduce CPU/IO impact of conversions (applies to all tools)
      - COMPRESSATORIUM_TOOL_NICE=10
      - COMPRESSATORIUM_TOOL_IOPRIO_CLASS=2
      - COMPRESSATORIUM_TOOL_IOPRIO_LEVEL=6
      # Nintendo Switch (nsz): directory holding your own prod.keys. Source of
      # truth when set; required for Switch compress/decompress. When unset, the
      # app best-effort looks in ~/.switch and your mounted volumes. No keys
      # ship with the image.
      # - SWITCH_KEYS=/keys
    volumes:
      # Required: Persistent config storage
      - ./config:/config
      # Optional: Switch keys for the nsz tool. Mount a directory containing
      # your own prod.keys, read-only. Keys come from a console you own; none
      # ship with this image.
      # - /host/path/to/switch-keys:/keys:ro
      # Optional: mount custom temp location (must match CHD_TEMP_DIR)
      # - ./temp:/temp
      # Mount your game directories here
      # The Web UI will recursively browse all subdirectories
      # Example directory structure:
      #   ./games/
      #   ├── Dreamcast/
      #   ├── PSP/
      #   └── PS1/
      # Syntax: /host/path:/container/path
      - ./games:/data/games
    restart: unless-stopped
    # Resource limits (adjust based on your system)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 8G
        reservations:
          cpus: '0.5'
          memory: 512M
