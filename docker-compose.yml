version: '3.8'

services:
  chd-converter:
    image: marctv/chd-converter:latest
    container_name: chd-converter
    ports:
      - "8080:8080"
    environment:
      # Mode: webui (default) or cli
      - CHD_MODE=webui
      # Comma-separated list of volume mount paths
      - CHD_VOLUMES=/data/games
      # Conversion mode: createcd (CD-ROM) or createdvd (DVD-ROM)
      - CHDMAN_MODE=createcd
      # Maximum parallel conversion jobs (Web UI only)
      - MAX_CONCURRENT_JOBS=2
    volumes:
      # Mount your game directories here
      # Syntax: /host/path:/container/path
      - ./games:/data/games
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    # Resource limits (adjust based on your system)
    # Uncomment to enable:
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2.0'
    #       memory: 4G
    #     reservations:
    #       cpus: '0.5'
    #       memory: 512M
